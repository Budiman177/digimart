<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiMart v11 - Pro System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --light: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding-bottom: 100px; color: var(--dark); }

        /* Header & Navigation */
        header { background: var(--primary); color: white; padding: 40px 20px 60px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .search-area { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 0 20px; max-width: 600px; margin: -30px auto 20px; position: relative; z-index: 100; }
        .search-input-wrapper { position: relative; flex: 1; }
        .search-box { width: 100%; padding: 15px 50px 15px 20px; border-radius: 30px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); outline: none; font-size: 16px; box-sizing: border-box; }
        .btn-search-icon { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: var(--primary); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .btn-main-scan { background: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.1); color: var(--primary); font-size: 1.3em; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-main-scan:active { transform: scale(0.9); }

        /* Scanner Area */
        #reader-container { max-width: 500px; margin: 10px auto; display: none; padding: 0 15px; position: relative; z-index: 101; }
        #reader { width: 100%; border-radius: 25px; overflow: hidden; border: 5px solid var(--white); box-shadow: 0 10px 30px rgba(0,0,0,0.2); background: #000; }

        /* Grid & Card */
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .stats { font-weight: bold; margin-bottom: 20px; border-left: 5px solid var(--primary); padding-left: 12px; font-size: 1.1em; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        
        .card { background: var(--white); border-radius: 30px; padding: 20px; text-align: center; position: relative; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.03); transition: 0.3s; }
        .no-urut { position: absolute; top: 15px; left: 15px; background: var(--dark); color: white; width: 28px; height: 28px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; z-index: 2; font-weight: bold; }
        
        /* Foto Fix: Background Putih & No Crop */
        .product-img-container { background: var(--white); border-radius: 20px; width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card h3 { margin: 10px 0 5px; font-size: 1.2em; color: var(--dark); }
        .price { color: var(--primary); font-weight: 800; font-size: 1.4em; margin: 5px 0; }
        
        /* Barcode Baru: Kompak & Menarik */
        .barcode-wrapper { margin: 15px auto 10px; width: 85%; background: #fcfcfc; padding: 10px; border-radius: 15px; border: 1px solid #f0f0f0; }
        .barcode-visual { height: 35px; background: repeating-linear-gradient(90deg, #444 0px, #444 2px, transparent 2px, transparent 4px); margin-bottom: 6px; width: 100%; }
        .barcode-text { font-family: 'Courier New', Courier, monospace; font-size: 12px; color: #777; font-weight: bold; }

        .btn-delete { background: none; border: none; color: #eb4d4b; cursor: pointer; font-size: 13px; margin-top: 15px; display: inline-flex; align-items: center; gap: 6px; font-weight: 600; opacity: 0.8; }
        .btn-delete:hover { opacity: 1; }

        /* Modal & Form */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 35px; width: 90%; max-width: 420px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #555; }
        .form-group input { width: 100%; padding: 14px; border: 2px solid #f1f1f1; border-radius: 15px; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.2s; }
        .form-group input:focus { border-color: var(--primary); background: #fff; }
        
        .custom-file-upload { display: block; width: 100%; padding: 15px; background: #f9f9f9; border: 2px dashed #dcdde1; border-radius: 15px; text-align: center; cursor: pointer; color: #7f8c8d; box-sizing: border-box; transition: 0.3s; }
        .custom-file-upload:hover { border-color: var(--primary); color: var(--primary); background: #f4fcf7; }
        #pImageFile { display: none; }

        .btn-save { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; box-shadow: 0 8px 20px rgba(39,174,96,0.3); }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(39,174,96,0.4); }

        .fab { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 10px 25px rgba(39,174,96,0.4); z-index: 99; transition: 0.3s; }
        .fab:hover { transform: scale(1.1) rotate(90deg); }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 2.2em; letter-spacing: 1px;">DigiMart</h1>
    <p style="margin:5px 0 0; opacity:0.9; font-weight: 300;">Daftar harga sembako DigiMart</p>
</header>

<div class="search-area">
    <div class="search-input-wrapper">
        <input type="text" class="search-box" id="search" placeholder="Cari nama atau scan barcode..." onkeyup="loadData()">
        <button class="btn-search-icon" onclick="loadData()"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    <button class="btn-main-scan" onclick="handleScanner('search')" id="btnMainScanner" title="Buka Kamera">
        <i class="fa-solid fa-camera"></i>
    </button>
</div>

<div id="reader-container">
    <div id="reader"></div>
    <button onclick="stopScanner()" style="width:100%; background:#2c3e50; border:none; color:white; padding:15px; margin-top:15px; border-radius:18px; cursor:pointer; font-weight:bold; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">TUTUP KAMERA</button>
</div>

<div class="container">
    <div class="stats" id="count">0 Jenis Jajanan</div>
    <div class="product-grid" id="grid"></div>
</div>

<div class="fab" onclick="toggleModal()"><i class="fa-solid fa-plus"></i></div>

<!-- Modal Tambah -->
<div class="modal" id="modalTambah">
    <div class="modal-content">
        <h2 style="text-align:center; margin:0 0 25px; color: var(--dark);">Tambah Produk</h2>
        
        <div class="form-group">
            <label>Barcode Produk</label>
            <div style="display:flex; gap:10px;">
                <input type="text" id="pBarcode" placeholder="Scan atau ketik kode">
                <button onclick="handleScanner('pBarcode')" style="background:var(--dark); color:white; border:none; width:55px; border-radius:15px; cursor:pointer;"><i class="fa-solid fa-barcode"></i></button>
            </div>
        </div>

        <div class="form-group">
            <label>Nama Produk</label>
            <input type="text" id="pName" placeholder="Contoh: Kopi Kapal Api">
        </div>

        <div class="form-group">
            <label>Harga (Rp)</label>
            <input type="number" id="pPrice" placeholder="Contoh: 2500">
        </div>

        <div class="form-group">
            <label>Foto Produk</label>
            <label for="pImageFile" class="custom-file-upload" id="file-label">
                <i class="fa-solid fa-image" style="margin-right:8px;"></i> <span id="file-name">Ambil/Pilih Foto</span>
            </label>
            <input type="file" id="pImageFile" accept="image/*" onchange="updateFileName()">
        </div>

        <button class="btn-save" onclick="processUpload()">Simpan Produk</button>
        <button style="width:100%; background:none; border:none; color:#95a5a6; margin-top:15px; cursor:pointer; font-weight:600;" onclick="toggleModal()">BATAL</button>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('digimart_v11')) || [];
    let html5QrCode = null;

    function updateFileName() {
        const input = document.getElementById('pImageFile');
        const label = document.getElementById('file-name');
        label.innerText = input.files[0] ? input.files[0].name : "Ambil/Pilih Foto";
    }

    function toggleModal() {
        const modal = document.getElementById('modalTambah');
        const isShowing = modal.style.display === 'flex';
        modal.style.display = isShowing ? 'none' : 'flex';
        if (html5QrCode) stopScanner();
    }

    // SCANNER FIX (Bisa diklik berkali-kali)
    async function handleScanner(targetId) {
        const container = document.getElementById('reader-container');
        
        // Jika scanner sedang aktif, matikan dulu sebelum buka yang baru
        if (html5QrCode && html5QrCode.isScanning) {
            await stopScanner();
        }

        container.style.display = 'block';
        container.scrollIntoView({ behavior: 'smooth', block: 'center' });

        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 20, qrbox: { width: 280, height: 150 } };

        try {
            await html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                document.getElementById(targetId).value = decodedText;
                if (navigator.vibrate) navigator.vibrate(100);
                stopScanner();
                if(targetId === 'search') loadData();
            });
        } catch (err) {
            alert("Gagal membuka kamera. Pastikan koneksi HTTPS dan izin kamera aktif.");
            container.style.display = 'none';
        }
    }

    async function stopScanner() {
        if (html5QrCode) {
            try {
                if (html5QrCode.isScanning) {
                    await html5QrCode.stop();
                }
            } catch (err) {
                console.error("Error stopping scanner", err);
            } finally {
                html5QrCode = null;
                document.getElementById('reader-container').style.display = 'none';
                // Hapus elemen internal library untuk reset total
                document.getElementById('reader').innerHTML = "";
            }
        }
    }

    // UPLOAD FIX (Canvas No Background Replace)
    function processUpload() {
        const barcode = document.getElementById('pBarcode').value;
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const file = document.getElementById('pImageFile').files[0];

        if (!name || !price) return alert("Nama & Harga harus diisi!");

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    // Standar size 500x500 untuk kualitas bagus
                    canvas.width = 500; canvas.height = 500;
                    
                    // Background Putih Bersih
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Ratio Centering (Kelihatan semua, tidak terpotong)
                    const ratio = Math.min(canvas.width / img.width, canvas.height / img.height);
                    const nw = img.width * ratio; 
                    const nh = img.height * ratio;
                    const x = (canvas.width - nw) / 2;
                    const y = (canvas.height - nh) / 2;
                    
                    ctx.drawImage(img, x, y, nw, nh);
                    saveData(barcode, name, price, canvas.toDataURL('image/jpeg', 0.85));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        } else {
            saveData(barcode, name, price, "https://via.placeholder.com/500/ffffff/2c3e50?text=No+Photo");
        }
    }

    function saveData(barcode, name, price, img) {
        products.push({ id: Date.now(), barcode, name, price, img });
        localStorage.setItem('digimart_v11', JSON.stringify(products));
        toggleModal();
        loadData();
        // Reset inputs
        document.getElementById('pBarcode').value = '';
        document.getElementById('pName').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pImageFile').value = '';
        document.getElementById('file-name').innerText = "Ambil/Pilih Foto";
    }

    function loadData() {
        const grid = document.getElementById('grid');
        const search = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = '';
        
        const filtered = products.filter(p => 
            p.name.toLowerCase().includes(search) || 
            (p.barcode && p.barcode.includes(search))
        );
        
        document.getElementById('count').innerText = `${filtered.length} Jenis Jajanan`;

        filtered.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="no-urut">${index + 1}</div>
                <div class="product-img-container">
                    <img src="${p.img}" class="product-img">
                </div>
                <h3>${p.name}</h3>
                <div class="price">Rp ${new Intl.NumberFormat('id-ID').format(p.price)}</div>
                
                <div class="barcode-wrapper">
                    <div class="barcode-visual"></div>
                    <div class="barcode-text">${p.barcode || '-----------'}</div>
                </div>

                <button class="btn-delete" onclick="deleteItem(${p.id})">
                    <i class="fa-solid fa-trash-can"></i> Hapus
                </button>
            `;
            grid.appendChild(card);
        });
    }

    function deleteItem(id) {
        if(confirm('Hapus produk ini?')) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('digimart_v11', JSON.stringify(products));
            loadData();
        }
    }

    loadData();
</script>
</body>
</html>
