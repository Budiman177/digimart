<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiMart v10 - Clean & Fast</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 100px; color: var(--dark); overflow-x: hidden; }
        
        header { background: var(--primary); color: white; padding: 50px 20px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

        .search-area { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 20px; max-width: 600px; margin: -35px auto 20px; position: relative; z-index: 10; }
        .search-input-wrapper { position: relative; flex: 1; }
        .search-box { width: 100%; padding: 15px 50px 15px 20px; border-radius: 30px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); outline: none; font-size: 16px; box-sizing: border-box; }
        
        .btn-search-icon { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: var(--primary); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-main-scan { background: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.1); color: var(--primary); font-size: 1.3em; display: flex; align-items: center; justify-content: center; }

        #reader-container { max-width: 450px; margin: 10px auto; display: none; padding: 0 15px; }
        #reader { width: 100%; border-radius: 25px; overflow: hidden; border: 4px solid var(--primary); background: #fff; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .stats { font-weight: bold; margin-bottom: 20px; border-left: 5px solid var(--primary); padding-left: 10px; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 25px; padding: 15px; text-align: center; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .no-urut { position: absolute; top: 12px; left: 12px; background: var(--dark); color: white; width: 26px; height: 26px; border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center; z-index: 2; }
        
        .product-img-container { background: #fff; border-radius: 20px; width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .price { color: var(--primary); font-weight: 800; font-size: 1.3em; margin: 5px 0; }
        .barcode-box { background: #f9f9f9; padding: 10px; border-radius: 15px; margin-top: 10px; }
        .barcode-text { font-family: monospace; font-size: 13px; color: #555; }
        .barcode-visual { height: 20px; background: repeating-linear-gradient(90deg, #333 0px, #333 2px, transparent 2px, transparent 4px); margin-bottom: 5px; opacity: 0.5; }

        /* MODAL & CUSTOM FILE INPUT */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 30px; border-radius: 35px; width: 90%; max-width: 420px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #666; }
        .form-group input { width: 100%; padding: 14px; border: 2px solid #f0f0f0; border-radius: 15px; box-sizing: border-box; font-size: 15px; }
        
        /* Fix Pilih File agar tidak terpotong */
        .custom-file-upload { display: block; width: 100%; padding: 12px; background: #fafafa; border: 2px dashed #ddd; border-radius: 15px; text-align: center; cursor: pointer; color: #888; transition: 0.3s; box-sizing: border-box; }
        .custom-file-upload:hover { border-color: var(--primary); color: var(--primary); }
        #pImageFile { display: none; }

        .btn-save { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .fab { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 10px 25px rgba(39, 174, 96, 0.4); z-index: 99; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:10px 0 5px;">DigiMart</h1>
    <p style="margin:0; opacity:0.8;">Daftar harga sembako DigiMart</p>
</header>

<div class="search-area">
    <div class="search-input-wrapper">
        <input type="text" class="search-box" id="search" placeholder="Scan barcode produk..." onkeyup="loadData()">
        <button class="btn-search-icon" onclick="loadData()"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    <button class="btn-main-scan" onclick="handleScanner('search')"><i class="fa-solid fa-camera"></i></button>
</div>

<div id="reader-container">
    <div id="reader"></div>
    <button onclick="stopScanner()" style="width:100%; background:#ff7675; border:none; color:white; padding:12px; margin-top:10px; border-radius:15px; cursor:pointer; font-weight:bold;">Tutup Kamera</button>
</div>

<div class="container">
    <div class="stats" id="count">0 Jenis Jajanan</div>
    <div class="product-grid" id="grid"></div>
</div>

<div class="fab" onclick="toggleModal()"><i class="fa-solid fa-plus"></i></div>

<div class="modal" id="modalTambah">
    <div class="modal-content">
        <h2 style="text-align:center; margin-top:0;">➕ Tambah Produk</h2>
        
        <div class="form-group">
            <label>Scan / Input Barcode</label>
            <div style="display:flex; gap:10px;">
                <input type="text" id="pBarcode" placeholder="Kode barcode">
                <button onclick="handleScanner('pBarcode')" style="background:var(--dark); color:white; border:none; width:50px; border-radius:15px; cursor:pointer;"><i class="fa-solid fa-barcode"></i></button>
            </div>
        </div>

        <div class="form-group">
            <label>Nama Produk</label>
            <input type="text" id="pName" placeholder="Contoh: Nabati Keju">
        </div>

        <div class="form-group">
            <label>Harga (Rp)</label>
            <input type="number" id="pPrice" placeholder="Contoh: 2500">
        </div>

        <div class="form-group">
            <label>Foto Produk</label>
            <label for="pImageFile" class="custom-file-upload" id="file-label">
                <i class="fa-solid fa-cloud-arrow-up"></i> <span id="file-name">Pilih Foto Produk</span>
            </label>
            <input type="file" id="pImageFile" accept="image/*" onchange="updateFileName()">
        </div>

        <button class="btn-save" onclick="processUpload()">Simpan Produk</button>
        <button style="width:100%; background:none; border:none; color:gray; margin-top:15px; cursor:pointer;" onclick="toggleModal()">Batal</button>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('digimart_v10')) || [];
    let html5QrCode;

    function updateFileName() {
        const input = document.getElementById('pImageFile');
        const label = document.getElementById('file-name');
        label.innerText = input.files[0] ? input.files[0].name : "Pilih Foto Produk";
    }

    function toggleModal() {
        const modal = document.getElementById('modalTambah');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        if (html5QrCode) stopScanner();
    }

    // SCANNER OPTIMIZED (FAST START)
    async function handleScanner(targetId) {
        const container = document.getElementById('reader-container');
        container.style.display = 'block';
        container.scrollIntoView({ behavior: 'smooth' });

        if (html5QrCode) await stopScanner();

        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 25, qrbox: { width: 280, height: 160 } };

        html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            document.getElementById(targetId).value = decodedText;
            if (navigator.vibrate) navigator.vibrate(100);
            stopScanner();
            if(targetId === 'search') loadData();
        }).catch(() => alert("Kamera Error: Gunakan HTTPS"));
    }

    async function stopScanner() {
        if (html5QrCode) {
            try {
                await html5QrCode.stop();
                html5QrCode = null;
            } catch (e) {}
        }
        document.getElementById('reader-container').style.display = 'none';
    }

    // LOGIKA PUTIHKAN BACKGROUND & UPLOAD
    function processUpload() {
        const barcode = document.getElementById('pBarcode').value;
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const file = document.getElementById('pImageFile').files[0];

        if (!name || !price) return alert("Isi Nama & Harga!");

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 400; canvas.height = 400;
                    
                    // Isi background canvas dengan putih dulu
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Gambar foto di tengah
                    const ratio = Math.min(canvas.width / img.width, canvas.height / img.height);
                    const nw = img.width * ratio; const nh = img.height * ratio;
                    const x = (canvas.width - nw) / 2; const y = (canvas.height - nh) / 2;
                    
                    ctx.drawImage(img, x, y, nw, nh);

                    // LOGIKA HAPUS HITAM: Ganti pixel gelap menjadi putih
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        // Jika pixel mendekati hitam (R,G,B rendah)
                        if (data[i] < 40 && data[i+1] < 40 && data[i+2] < 40) {
                            data[i] = 255; data[i+1] = 255; data[i+2] = 255;
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);
                    
                    saveData(barcode, name, price, canvas.toDataURL('image/jpeg', 0.8));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        } else {
            saveData(barcode, name, price, "https://via.placeholder.com/300x300?text=No+Photo");
        }
    }

    function saveData(barcode, name, price, img) {
        products.push({ id: Date.now(), barcode, name, price, img });
        localStorage.setItem('digimart_v10', JSON.stringify(products));
        toggleModal(); loadData();
    }

    function loadData() {
        const grid = document.getElementById('grid');
        const search = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = '';
        const filtered = products.filter(p => p.name.toLowerCase().includes(search) || (p.barcode && p.barcode.includes(search)));
        document.getElementById('count').innerText = `${filtered.length} Jenis Jajanan`;

        filtered.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="no-urut">${index + 1}</div>
                <div class="product-img-container"><img src="${p.img}" class="product-img"></div>
                <h3 style="margin:5px 0;">${p.name}</h3>
                <div class="price">Rp ${new Intl.NumberFormat('id-ID').format(p.price)}</div>
                <div class="barcode-box">
                    <div class="barcode-visual"></div>
                    <div class="barcode-text">${p.barcode || '---'}</div>
                </div>
                <button onclick="deleteItem(${p.id})" style="border:none; background:none; color:#ff7675; cursor:pointer; margin-top:10px; font-size:12px;"><i class="fa-solid fa-trash"></i> Hapus</button>
            `;
            grid.appendChild(card);
        });
    }

    function deleteItem(id) {
        if(confirm('Hapus produk?')) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('digimart_v10', JSON.stringify(products));
            loadData();
        }
    }

    loadData();
</script>
</body>
</html>
