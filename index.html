<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiMart v9 - Professional Barcode System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 100px; color: var(--dark); }
        
        header { background: var(--primary); color: white; padding: 50px 20px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        header img { width: 50px; margin-bottom: 10px; }

        .search-area { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 20px; max-width: 600px; margin: -35px auto 20px; position: relative; z-index: 10; }
        .search-input-wrapper { position: relative; flex: 1; }
        .search-box { width: 100%; padding: 15px 50px 15px 20px; border-radius: 30px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); outline: none; font-size: 16px; box-sizing: border-box; }
        
        .btn-search-icon { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: var(--primary); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-main-scan { background: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.1); color: var(--primary); font-size: 1.3em; display: flex; align-items: center; justify-content: center; }

        /* Area Scanner */
        #reader-container { max-width: 450px; margin: 10px auto; display: none; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 4px solid var(--primary); background: #000; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .stats { font-weight: bold; margin-bottom: 20px; color: var(--dark); border-left: 5px solid var(--primary); padding-left: 10px; display: flex; align-items: center; gap: 8px; }

        /* TAMPILAN KARTU BARU (Putih Bersih) */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 25px; padding: 15px; text-align: center; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #eee; }
        .no-urut { position: absolute; top: 12px; left: 12px; background: var(--dark); color: white; width: 26px; height: 26px; border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center; z-index: 2; font-weight: bold; }
        
        .product-img-container { background: #fff; border-radius: 20px; width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card h3 { margin: 10px 0 5px; font-size: 1.1em; color: #333; text-transform: capitalize; }
        .price { color: var(--primary); font-weight: 800; font-size: 1.3em; margin: 5px 0; }
        
        /* Barcode Batang Style */
        .barcode-box { background: #f9f9f9; padding: 10px; border-radius: 15px; margin-top: 10px; border: 1px dashed #ddd; }
        .barcode-text { font-family: 'Courier New', Courier, monospace; font-size: 13px; font-weight: bold; color: #555; letter-spacing: 1px; }
        .barcode-visual { height: 30px; background: repeating-linear-gradient(90deg, #333 0px, #333 2px, transparent 2px, transparent 4px); margin-bottom: 5px; opacity: 0.8; }

        .btn-delete { background: none; border: none; color: #ff7675; cursor: pointer; font-size: 12px; margin-top: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }

        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 30px; border-radius: 35px; width: 90%; max-width: 420px; box-sizing: border-box; box-shadow: 0 20px 50px rgba(0,0,0,0.2); position: relative; }
        .modal-content h2 { text-align: center; margin-top: 0; font-size: 1.5em; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #666; }
        .form-group input { width: 100%; padding: 14px; border: 2px solid #f0f0f0; border-radius: 15px; box-sizing: border-box; font-size: 15px; background: #fafafa; transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary); outline: none; background: #fff; }
        
        .input-scan-group { display: flex; gap: 10px; }
        .btn-input-scan { background: var(--dark); color: white; border: none; width: 50px; border-radius: 15px; cursor: pointer; font-size: 1.1em; }

        .btn-save { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3); }
        .fab { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 10px 25px rgba(39, 174, 96, 0.4); z-index: 99; transition: 0.3s; }
        .fab:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<header>
    <div style="font-size: 2.5em; margin-bottom: 5px;">🏪</div>
    <h1>DigiMart</h1>
    <p>Daftar harga sembako DigiMart</p>
</header>

<div class="search-area">
    <div class="search-input-wrapper">
        <input type="text" class="search-box" id="search" placeholder="Cari nama atau scan barcode..." onkeyup="loadData()">
        <button class="btn-search-icon" onclick="loadData()"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    <button class="btn-main-scan" onclick="handleScanner('search')" id="mainScanBtn"><i class="fa-solid fa-camera"></i></button>
</div>

<div id="reader-container">
    <div id="reader"></div>
    <button onclick="stopScanner()" style="width:100%; background:#ff7675; border:none; color:white; padding:10px; margin-top:5px; border-radius:10px; cursor:pointer; font-weight:bold;">Tutup Kamera</button>
</div>

<div class="container">
    <div class="stats" id="count">
        <span style="color: var(--primary); font-size: 1.2em;">▌</span> 0 Jenis Jajanan
    </div>
    <div class="product-grid" id="grid"></div>
</div>

<div class="fab" onclick="toggleModal()"><i class="fa-solid fa-plus"></i></div>

<!-- Modal Tambah Produk -->
<div class="modal" id="modalTambah">
    <div class="modal-content">
        <h2>➕ Tambah Produk</h2>
        
        <div class="form-group">
            <label>Scan / Input Barcode</label>
            <div class="input-scan-group">
                <input type="text" id="pBarcode" placeholder="Kode barcode produk">
                <button class="btn-input-scan" onclick="handleScanner('pBarcode')"><i class="fa-solid fa-barcode"></i></button>
            </div>
        </div>

        <div class="form-group">
            <label>Nama Produk</label>
            <input type="text" id="pName" placeholder="Contoh: Nabati Keju">
        </div>

        <div class="form-group">
            <label>Harga (Rp)</label>
            <input type="number" id="pPrice" placeholder="Contoh: 2500">
        </div>

        <div class="form-group">
            <label>Foto Produk</label>
            <input type="file" id="pImageFile" accept="image/*" style="background: none; border: none; padding: 0;">
        </div>

        <button class="btn-save" onclick="processUpload()">Simpan ke DigiMart</button>
        <button style="width:100%; background:none; border:none; color:gray; margin-top:15px; cursor:pointer;" onclick="toggleModal()">Batal</button>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('digimart_v9')) || [];
    let html5QrCode;

    function toggleModal() {
        const modal = document.getElementById('modalTambah');
        const isOpen = modal.style.display === 'flex';
        modal.style.display = isOpen ? 'none' : 'flex';
        if (html5QrCode) stopScanner();
    }

    function formatRupiah(angka) {
        return new Intl.NumberFormat('id-ID').format(angka);
    }

    // FUNGSI SCANNER YANG DIPERBAIKI
    function handleScanner(targetId) {
        // Jika scanner sedang jalan, matikan dulu
        if (html5QrCode && html5QrCode.isScanning) {
            stopScanner();
            return;
        }

        const container = document.getElementById('reader-container');
        container.style.display = 'block';
        container.scrollIntoView({ behavior: 'smooth' });

        html5QrCode = new Html5Qrcode("reader");
        
        const config = { 
            fps: 20, 
            qrbox: { width: 280, height: 160 }, // Optimal untuk Barcode memanjang
            aspectRatio: 1.0 
        };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                document.getElementById(targetId).value = decodedText;
                if (navigator.vibrate) navigator.vibrate(100);
                
                stopScanner();
                
                if(targetId === 'search') {
                    loadData();
                    window.scrollTo({ top: 200, behavior: 'smooth' });
                }
            }
        ).catch(err => {
            alert("Kamera tidak dapat diakses. Gunakan HTTPS dan berikan izin kamera.");
            container.style.display = 'none';
        });
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader-container').style.display = 'none';
                html5QrCode = null;
            }).catch(() => {
                document.getElementById('reader-container').style.display = 'none';
            });
        }
    }

    function processUpload() {
        const barcode = document.getElementById('pBarcode').value;
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const file = document.getElementById('pImageFile').files[0];

        if (!name || !price) return alert("Nama dan Harga wajib diisi!");

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_WIDTH = 500;
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    saveData(barcode, name, price, canvas.toDataURL('image/jpeg', 0.8));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        } else {
            saveData(barcode, name, price, "https://via.placeholder.com/300x300?text=No+Image");
        }
    }

    function saveData(barcode, name, price, img) {
        products.push({ id: Date.now(), barcode, name, price, img });
        localStorage.setItem('digimart_v9', JSON.stringify(products));
        toggleModal();
        loadData();
        // Reset form
        document.getElementById('pBarcode').value = '';
        document.getElementById('pName').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pImageFile').value = '';
    }

    function loadData() {
        const grid = document.getElementById('grid');
        const search = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = '';
        
        const filtered = products.filter(p => 
            p.name.toLowerCase().includes(search) || 
            (p.barcode && p.barcode.includes(search))
        );
        
        document.getElementById('count').innerHTML = `<span style="color: var(--primary); font-size: 1.2em;">▌</span> ${filtered.length} Jenis Jajanan`;

        filtered.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="no-urut">${index + 1}</div>
                <div class="product-img-container">
                    <img src="${p.img}" class="product-img">
                </div>
                <h3>${p.name}</h3>
                <div class="price">Rp ${formatRupiah(p.price)}</div>
                
                <div class="barcode-box">
                    <div class="barcode-visual"></div>
                    <div class="barcode-text">${p.barcode || 'NO BARCODE'}</div>
                </div>

                <button class="btn-delete" onclick="deleteItem(${p.id})">
                    <i class="fa-solid fa-trash-can"></i> Hapus Produk
                </button>
            `;
            grid.appendChild(card);
        });
    }

    function deleteItem(id) {
        if(confirm('Hapus produk ini dari daftar?')) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('digimart_v9', JSON.stringify(products));
            loadData();
        }
    }

    loadData();
</script>
</body>
</html>
